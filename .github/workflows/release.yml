name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          ARCH="${{ matrix.goarch }}"
          if [ "$ARCH" = "amd64" ]; then ARCH="x86_64"; fi

          go build -ldflags="-s -w" -o lazysync .

          ARCHIVE_NAME="lazysync_${GITHUB_REF_NAME#v}_Linux_${ARCH}"
          tar czf "${ARCHIVE_NAME}.tar.gz" lazysync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazysync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lazysync_*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum lazysync_* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
