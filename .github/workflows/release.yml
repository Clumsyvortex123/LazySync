name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: "386"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          ARCH="${{ matrix.goarch }}"
          if [ "$ARCH" = "amd64" ]; then ARCH="x86_64"; fi
          if [ "$ARCH" = "386" ]; then ARCH="x86"; fi
          if [ "$ARCH" = "arm" ]; then ARCH="armv7"; fi

          OS="$(echo $GOOS | sed 's/./\U&/')"

          BINARY="lazysync${EXT}"
          go build -ldflags="-s -w" -o "$BINARY" .

          ARCHIVE_NAME="lazysync_${GITHUB_REF_NAME#v}_${OS}_${ARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "${ARCHIVE_NAME}.zip" "$BINARY"
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" "$BINARY"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazysync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lazysync_*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum lazysync_* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
